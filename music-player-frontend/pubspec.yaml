name: music_player_frontend
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
objectbox:
  output_dir: core/database
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # state management
  provider: ^6.1.1

  # objectbox
  objectbox: ^4.1.0
  objectbox_flutter_libs: any
  collection: ^1.19.1

  # audio
  just_audio: ^0.9.42
  audio_service: ^0.18.16
  on_audio_query_forked: ^2.9.1
  audiotags: ^1.4.0

  # utils
  file_picker: ^8.0.0+1
  file_saver: ^0.2.12
  path_provider: ^2.1.2
  permission_handler: ^11.2.0

  # ui
  image: ^4.2.0
  scrollable_positioned_list: ^0.3.5
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1
  bot_toast: ^4.1.3
  after_layout: ^1.1.0
  duration: ^4.0.3
  mesh_gradient: ^1.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.0.0
  objectbox_generator: any
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
  fonts:
    - family: FluentIcons-Resizable
      fonts:
        - asset: assets/fonts/FluentSystemIcons-Resizable.ttf