name: music_player_frontend
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
objectbox:
  output_dir: core/database
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # state management
  provider: ^6.1.1

  # objectbox
  objectbox: ^4.1.0
  objectbox_flutter_libs: any

  # audio
  just_audio: ^0.9.42 # default audio player
  audioplayers: ^6.0.0 # audio player for windows and linux
  audio_service: ^0.18.16 # default audio service
  audio_service_mpris: ^0.2.0 # for linux
  on_audio_query_forked: ^2.9.1 # query audio files and their metadata on mobile
  audio_metadata_reader: ^1.4.2 # read audio metadata on desktop

  # File Management
  file_picker: ^10.1.2
  file_saver: ^0.2.12
  path_provider: ^2.1.2
  watcher: ^1.1.1
  permission_handler: ^11.2.0

  # ui
  image: ^4.2.0
  scrollable_positioned_list: ^0.3.5
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1
  bot_toast: ^4.1.3
  after_layout: ^1.1.0
  duration: ^4.0.3
  mesh_gradient: ^1.3.8

  # desktop
  desktop_drop: ^0.5.0
  tray_manager: ^0.5.0
  flutter_single_instance: ^1.2.3

  #linux and windows only
  bitsdojo_window: ^0.1.6

  # utils
  collection: ^1.19.1
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.0.0
  objectbox_generator: any
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
  fonts:
    - family: FluentIcons-Resizable
      fonts:
        - asset: assets/fonts/FluentSystemIcons-Resizable.ttf