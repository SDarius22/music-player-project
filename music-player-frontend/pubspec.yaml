name: music_player_frontend
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
objectbox:
  output_dir: core/database
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # state management
  provider: ^6.1.5+1

  # objectbox
  objectbox: ^5.2.0
  objectbox_flutter_libs: any

  # audio
  just_audio: ^0.10.5 # default audio player
  just_audio_platform_interface: ^4.6.0

  media_kit: ^1.2.6
  media_kit_libs_linux: any
  media_kit_libs_windows_audio: any

  audio_service: ^0.18.18 # default audio service
  audio_service_mpris: ^0.2.0 # for linux
  audio_service_win: ^0.0.2 # for windows
  on_audio_query_forked: ^2.9.1 # query audio files and their metadata on mobile
  audio_metadata_reader: ^1.4.2 # read audio metadata on desktop

  # File Management
  file_picker: ^10.3.10
  file_saver: ^0.3.1
  path_provider: ^2.1.5
  watcher: ^1.2.1
  permission_handler: ^12.0.1

  # ui
  responsive_framework: ^1.5.1
  image: ^4.7.2
  scrollable_positioned_list: ^0.3.5
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.2.3
  bot_toast: ^4.1.3
  after_layout: ^1.1.0
  duration: ^4.0.3
  mesh_gradient: ^1.3.8
  cached_network_image: ^3.2.3
  scaffold_gradient_background: ^1.0.3+1
  sliding_up_panel: ^2.0.0+1
  auto_size_text: ^3.0.0

  # desktop
  desktop_drop: ^0.7.0
  tray_manager: ^0.5.2
  flutter_single_instance: ^1.7.0
  bitsdojo_window: ^0.1.6
  flutter_fullscreen: ^1.2.0

  # utils
  collection: ^1.19.1
  rxdart: ^0.28.0
  logging: ^1.3.0
  universal_platform: ^1.1.0
  flutter_webrtc: ^1.3.1
  web_socket_channel: ^3.0.3
  flutter_secure_storage: ^10.0.0
  http: ^1.6.0
  web: ^1.1.1
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  mockito: ^5.4.4
  build_runner: ^2.11.1
  objectbox_generator: ^5.2.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
  fonts:
    - family: FluentIcons-Resizable
      fonts:
        - asset: assets/fonts/FluentSystemIcons-Resizable.ttf