<!DOCTYPE html>
<html>
<head>
    <base href="$FLUTTER_BASE_HREF">

    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta content="Peer-assisted music streaming client." name="description">

    <!-- iOS meta tags & icons -->
    <meta content="yes" name="mobile-web-app-capable">
    <meta content="black" name="apple-mobile-web-app-status-bar-style">
    <meta content="music_player_frontend" name="apple-mobile-web-app-title">
    <link href="icons/Icon-192.png" rel="apple-touch-icon">

    <!-- Favicon -->
    <link href="favicon.png" rel="icon" type="image/png"/>

    <title>Music Player</title>
    <link href="manifest.json" rel="manifest">

    <style>
        body {
            min-width: 800px;
            min-height: 600px;
        }
    </style>
</head>
<body>
<script async src="flutter_bootstrap.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        const appBaseUrl = new URL('./', document.baseURI);
        const workerUrl = new URL('p2p-worker.js', appBaseUrl);
        navigator.serviceWorker.register(workerUrl.href, {
            scope: appBaseUrl.pathname
        }).then(function () {
            console.info('P2P ServiceWorker registered');
        }).catch(function (err) {
            console.error('P2P ServiceWorker registration failed: ', err);
        });
    }
</script>
</body>
</html>
