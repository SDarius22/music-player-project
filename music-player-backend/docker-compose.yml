services:
  backend:
    image: ghcr.io/sdarius22/music-player-project/music-player-backend:latest
    deploy:
      replicas: 2
    environment:
      - DB_HOST=pg-master
      - DB_PORT=5432
      - DB_NAME=music_db
      - DB_USER=music_admin
      - DB_PASSWORD=${DB_PASSWORD}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - REDIS_HOST=redis
    ports:
      - "9000-9001:9000"
    restart: unless-stopped
    volumes:
      - /home/docker-data/music_data:/root/music-server

  pg-master:
    image: registry.bitnami.com/bitnami/postgresql:18
    environment:
      - POSTGRESQL_REPLICATION_MODE=master
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=${DB_PASSWORD}
      - POSTGRESQL_USERNAME=music_admin
      - POSTGRESQL_PASSWORD=${DB_PASSWORD}
      - POSTGRESQL_DATABASE=music_db
    volumes:
      - /home/docker-data/postgres_master:/bitnami/postgresql
    restart: unless-stopped

  pg-slave:
    image: registry.bitnami.com/bitnami/postgresql:18
    environment:
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=${DB_PASSWORD}
      - POSTGRESQL_MASTER_HOST=pg-master
      - POSTGRESQL_MASTER_PORT_NUMBER=5432
      - POSTGRESQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - /home/docker-data/postgres_slave:/bitnami/postgresql
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=darius.sala@bt-app.com
      - PGADMIN_DEFAULT_PASSWORD=${DB_PASSWORD}
    ports:
      - "5050:80"
    restart: unless-stopped

  redis:
    image: redis:alpine
    restart: unless-stopped

  goaccess:
    image: allinurl/goaccess
    ports:
      - "7890:7890"
    volumes:
      - /var/log/nginx:/srv/logs
    command: goaccess /srv/logs/access.log -o /srv/report.html --real-time-html --log-format=COMBINED
    restart: unless-stopped