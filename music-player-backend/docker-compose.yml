services:
  postgres:
    image: postgres:latest
    container_name: music_player_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: music_player_db
    ports:
      - "5445:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d music_player_db" ]
      interval: 5s
      timeout: 5s
      retries: 5