openapi: 3.1.1
info:
  title: Peer-Assisted Music Streaming API
  description: Backend API for hybrid prefix caching, predictive pre-fetching, and master fallback.
  version: 1.0.0
servers:
  - url: /api/v1

paths:
  /songs:
    get:
      summary: Get songs
      description: |
        Retrieves paginated song metadata.

        Visibility rule:
        - Authenticated callers receive streamable songs plus user-uploaded songs they own.
      operationId: getAllSongs
      tags:
        - Songs
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Case-insensitive search in song name, artist name, and album name.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: name,asc
          description: Sort as `field,direction` (e.g. `name,asc`, `year,desc`).
      responses:
        '200':
          description: A page of songs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SongPageDto'
    post:
      summary: Upload a new song
      description: Ingests a raw audio file (MP3/FLAC), deduplicates chunks, and stores metadata.
      operationId: uploadSong
      tags:
        - Songs
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SongUploadDto'

      responses:
        '201':
          description: Song created and chunks processed
        '400':
          description: Invalid input

  /songs/negotiate:
    post:
      summary: Negotiate a user upload
      description: Client sends metadata and chunk hashes. Server returns ID and list of missing chunk indices.
      operationId: negotiateUserUpload
      tags:
        - Songs
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NegotiationRequestDto'
      responses:
        '200':
          description: Negotiation successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NegotiationResponseDto'

  /songs/recommendations:
    get:
      summary: Get personalised song recommendations
      description: |
        Paginated recommendations ordered by play count descending. Songs the
        user already played in the last 48 hours are excluded so the list
        stays fresh.
      operationId: getRecommendations
      tags:
        - Songs
      security:
        - bearerAuth: [ ]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: A page of recommended songs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SongPageDto'
        '401':
          description: Unauthorized

  /songs/forgotten:
    get:
      summary: Get forgotten favourites
      description: |
        Paginated list of songs the user played at least once but has not
        listened to in the last 30 days, ordered by last-played ascending so
        the most-forgotten tracks surface first.
      operationId: getForgottenFavourites
      tags:
        - Songs
      security:
        - bearerAuth: [ ]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: A page of forgotten favourite songs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SongPageDto'
        '401':
          description: Unauthorized

  /songs/quick-dial:
    get:
      summary: Get quick-dial songs
      description: |
        Paginated list ordered by recency, with songs that have never been
        played falling back to their added-at timestamp.
      operationId: getQuickDial
      tags:
        - Songs
      security:
        - bearerAuth: [ ]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: A page of quick-dial songs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SongPageDto'
        '401':
          description: Unauthorized

  /songs/favourites:
    get:
      summary: Get the user's favourite songs
      description: Paginated list of songs the user has liked, ordered by play count descending.
      operationId: getFavourites
      tags:
        - Songs
      security:
        - bearerAuth: [ ]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: A page of liked songs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SongPageDto'
        '401':
          description: Unauthorized

  /songs/most-played:
    get:
      summary: Get the user's most-played songs
      description: Paginated list of songs the user has played at least once, ordered by play count descending.
      operationId: getMostPlayed
      tags:
        - Songs
      security:
        - bearerAuth: [ ]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: A page of most-played songs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SongPageDto'
        '401':
          description: Unauthorized

  /songs/recently-played:
    get:
      summary: Get the user's recently-played songs
      description: Paginated list of songs the user has played, ordered by last-played descending.
      operationId: getRecentlyPlayed
      tags:
        - Songs
      security:
        - bearerAuth: [ ]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: A page of recently-played songs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SongPageDto'
        '401':
          description: Unauthorized

  /songs/{fileHash}:
    get:
      summary: Get song metadata
      description: Retrieves metadata for a specific song by file hash.
      operationId: getSongById
      tags:
        - Songs
      parameters:
        - name: fileHash
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Song metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SongDto'
        '404':
          description: Song not found
    patch:
      summary: Update the requesting user's library entry for a song
      description: |
        Updates per-user fields (`likedByUser`, `lastPlayed`, `playCount`) for the
        song in the current user's library. Only fields present in the request
        body are changed; missing fields stay as they were.
      operationId: updateUserSongLibrary
      tags:
        - Songs
      security:
        - bearerAuth: [ ]
      parameters:
        - name: fileHash
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserSongDto'
      responses:
        '200':
          description: Updated song metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SongDto'
        '401':
          description: Unauthorized
        '404':
          description: Song not found

  /songs/{fileHash}/cover:
    get:
      summary: Get song cover art
      description: Returns the binary cover image for the song's album.
      operationId: getSongCover
      tags:
        - Songs
      parameters:
        - name: fileHash
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cover image bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Song or cover not found

  /songs/{fileHash}/lyrics:
    get:
      summary: Get saved lyrics for a song
      operationId: getSongLyrics
      tags:
        - Songs
      security:
        - bearerAuth: [ ]
      parameters:
        - name: fileHash
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Saved song lyrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LyricsDto'
        '401':
          description: Unauthorized
        '404':
          description: Song or lyrics not found
    put:
      summary: Upsert lyrics for a song
      operationId: upsertSongLyrics
      tags:
        - Songs
      security:
        - bearerAuth: [ ]
      parameters:
        - name: fileHash
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LyricsDto'
      responses:
        '200':
          description: Lyrics saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LyricsDto'
        '400':
          description: Lyrics are empty or too large
        '401':
          description: Unauthorized
        '404':
          description: Song not found

  /songs/{fileHash}/chunks/{chunkIndex}:
    post:
      summary: Upload a missing chunk
      description: Uploads a specific 64KB binary chunk to fill a gap in a user song.
      operationId: uploadMissingChunk
      tags:
        - Songs
      security:
        - bearerAuth: [ ]
      parameters:
        - name: fileHash
          in: path
          required: true
          schema:
            type: string
        - name: chunkIndex
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - chunkData
                - contentHash
              properties:
                chunkData:
                  type: string
                  format: binary
                contentHash:
                  type: string
                  description: The SHA-256 hash of this chunk for verification.
      responses:
        '201':
          description: Chunk accepted and linked
        '400':
          description: Hash mismatch or invalid index

  /albums:
    get:
      summary: Get albums
      operationId: getAlbums
      tags:
        - Albums
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Case-insensitive search in album name or artist name.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: name,asc
          description: Sort as `field,direction` (e.g. `name,asc`).
      responses:
        '200':
          description: A page of albums
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumPageDto'

  /albums/{albumHash}:
    get:
      summary: Get album by hash
      operationId: getAlbumByHash
      tags:
        - Albums
      parameters:
        - name: albumHash
          in: path
          required: true
          schema:
            type: string

      responses:
        '200':
          description: Album with tracks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumExpandedDto'
        '404':
          description: Album not found

  /albums/{albumHash}/cover:
    get:
      summary: Get album cover art
      operationId: getAlbumCover
      tags:
        - Albums
      parameters:
        - name: albumHash
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cover image bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Album or cover not found

  /albums/{albumHash}/songs:
    get:
      summary: Get songs in an album
      description: Returns songs visible to the caller in the album, ordered by disc number then track number.
      operationId: getAlbumSongs
      tags:
        - Albums
      parameters:
        - name: albumHash
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: A page of songs in the album
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SongPageDto'
        '404':
          description: Album not found

  /artists:
    get:
      summary: Get artists
      operationId: getArtists
      tags:
        - Artists
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Case-insensitive search in artist name.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: name,asc
      responses:
        '200':
          description: A page of artists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtistPageDto'

  /artists/{artistHash}:
    get:
      summary: Get artist by hash
      operationId: getArtistByHash
      tags:
        - Artists
      parameters:
        - name: artistHash
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Artist with albums
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtistExpandedDto'
        '404':
          description: Artist not found

  /artists/{artistHash}/cover:
    get:
      summary: Get artist cover art
      description: Returns the cover image of the artist's first album that has one.
      operationId: getArtistCover
      tags:
        - Artists
      parameters:
        - name: artistHash
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cover image bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Artist or cover not found

  /artists/{artistHash}/songs:
    get:
      summary: Get songs by artist
      description: Returns songs visible to the caller for this artist, ordered by song name.
      operationId: getArtistSongs
      tags:
        - Artists
      parameters:
        - name: artistHash
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: A page of songs by the artist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SongPageDto'
        '404':
          description: Artist not found

  /playlists:
    get:
      summary: Get the current user's playlists
      description: Returns playlists where `songFileHashes` preserves each playlist's persisted song order.
      operationId: getPlaylists
      tags:
        - Playlists
      security:
        - bearerAuth: [ ]
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Case-insensitive substring match on playlist name.
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: name,asc
          description: Sort as `field,direction`. Supported fields are `name` and `createdAt`.
        - name: filter[indestructible]
          in: query
          required: false
          schema:
            type: boolean
          description: When set, restricts the result to indestructible (`true`) or destructible (`false`) playlists.
        - name: includeQueue
          in: query
          required: false
          schema:
            type: boolean
          description: When true, the Queue playlist is prepended to the first page of results.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: A page of playlists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistPageDto'
        '401':
          description: Unauthorized
    post:
      summary: Create a playlist
      description: Creates a playlist.
      operationId: createPlaylist
      tags:
        - Playlists
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlaylistDto'
      responses:
        '201':
          description: Playlist created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistExpandedDto'
        '401':
          description: Unauthorized

  /playlists/details-by-name/{name}:
    get:
      summary: Look up a single playlist by name
      description: |
        Returns the detail of the requesting user's playlist whose name
        matches `name` exactly. Useful for fetching the indestructible default
        playlists (e.g. `Queue`, `Favourites`) without paginating the list.
      operationId: getPlaylistByName
      tags:
        - Playlists
      security:
        - bearerAuth: [ ]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Exact case-sensitive playlist name.
      responses:
        '200':
          description: Playlist with tracks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistExpandedDto'
        '401':
          description: Unauthorized
        '404':
          description: Playlist not found

  /playlists/{playlistId}:
    get:
      summary: Get playlist by ID
      description: Returns playlist songs in persisted playlist order.
      operationId: getPlaylistById
      tags:
        - Playlists
      security:
        - bearerAuth: [ ]
      parameters:
        - name: playlistId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Playlist with tracks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistExpandedDto'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Playlist not found
    patch:
      summary: Update a playlist
      description: Updates playlist name, song order, and/or cover image. Only provided fields are updated; others remain unchanged.
      operationId: updatePlaylist
      tags:
        - Playlists
      security:
        - bearerAuth: [ ]
      parameters:
        - name: playlistId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePlaylistDto'
      responses:
        '200':
          description: Playlist updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistExpandedDto'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Playlist not found
    delete:
      summary: Delete a playlist
      operationId: deletePlaylist
      tags:
        - Playlists
      security:
        - bearerAuth: [ ]
      parameters:
        - name: playlistId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Playlist deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Playlist not found

  /playlists/{playlistId}/cover:
    get:
      summary: Get playlist cover art
      operationId: getPlaylistCover
      tags:
        - Playlists
      security:
        - bearerAuth: [ ]
      parameters:
        - name: playlistId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Cover image bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Playlist or cover not found

  /playlists/{playlistId}/songs:
    get:
      summary: Get songs in a playlist
      description: Returns playlist songs visible to the caller in persisted playlist order.
      operationId: getPlaylistSongs
      tags:
        - Playlists
      security:
        - bearerAuth: [ ]
      parameters:
        - name: playlistId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: A page of songs in the playlist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SongPageDto'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Playlist not found

  /playback:
    get:
      summary: Get saved playback state
      description: Returns the most recently saved queue, current song, and position for the authenticated user.
      operationId: getPlaybackState
      tags:
        - Playback
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Saved playback state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaybackStateDto'
        '204':
          description: No saved state exists yet
        '401':
          description: Unauthorized
    put:
      summary: Save playback state
      description: |
        Persists the caller's current queue, active song, and seek position.
        All other sessions of the same user receive a PLAYBACK_STATE_CHANGED
        WebSocket event so they can re-fetch the updated state.
      operationId: savePlaybackState
      tags:
        - Playback
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaybackStateDto'
      responses:
        '200':
          description: State saved; returns the persisted state with server-set updatedAt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaybackStateDto'
        '401':
          description: Unauthorized

  /stream/{fileHash}/manifest:
    get:
      summary: Get chunk manifest
      operationId: getSongManifest
      tags:
        - Streaming
      parameters:
        - name: fileHash
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Chunk manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChunkManifestDto'

  /stream/{fileHash}/chunk/{chunkIndex}:
    get:
      summary: Get specific chunk
      operationId: getSongChunk
      tags:
        - Streaming
      parameters:
        - name: fileHash
          in: path
          required: true
          schema:
            type: string
        - name: chunkIndex
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Binary chunk data
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /statistics:
    get:
      summary: Get chunk delivery statistics
      description: Returns all recorded chunk delivery statistics. Admin only.
      operationId: getStatistics
      tags:
        - Statistics
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: List of chunk delivery statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChunkStatDto'
        '403':
          description: Forbidden
    post:
      summary: Submit chunk delivery statistics
      description: Records chunk delivery statistics for a completed song playback.
      operationId: submitStatistic
      tags:
        - Statistics
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChunkStatDto'
      responses:
        '201':
          description: Statistic recorded
        '401':
          description: Unauthorized

  /auth/send-code:
    post:
      summary: Send verification code
      operationId: sendVerificationCode
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailRequest'
      responses:
        '200':
          description: Code sent

  /auth/verify:
    post:
      summary: Verify authentication code
      operationId: verifyAuthenticationCode
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerificationRequest'
      responses:
        '200':
          description: Token returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid or expired verification code

  /auth/refresh:
    post:
      summary: Refresh access token
      operationId: refreshAccessToken
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: New access token returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid or expired refresh token

  /health:
    get:
      summary: Health check
      description: Simple endpoint to verify the service is running.
      operationId: healthCheck
      security:
        - bearerAuth: [ ]
      tags:
        - Health
      responses:
        '200':
          description: Service is healthy

components:
  schemas:
    ArtistDto:
      type: object
      properties:
        hash:
          type: string
        name:
          type: string

    ArtistExpandedDto:
      type: object
      description: Artist summary used in paginated list responses. Includes ordered song file hashes.
      properties:
        hash:
          type: string
        name:
          type: string
        songFileHashes:
          type: array
          items:
            type: string
          description: Ordered file hashes of all songs by this artist (ordered by song name).

    ArtistPageDto:
      type: object
      required:
        - content
        - page
        - size
        - totalElements
        - totalPages
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ArtistExpandedDto'
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 1
        totalElements:
          type: integer
          format: int64
          minimum: 0
        totalPages:
          type: integer
          minimum: 0

    AlbumDto:
      type: object
      properties:
        hash:
          type: string
        name:
          type: string

    AlbumExpandedDto:
      type: object
      description: Album summary used in paginated list responses. Includes ordered song file hashes.
      properties:
        hash:
          type: string
        name:
          type: string
        songFileHashes:
          type: array
          items:
            type: string
          description: Ordered file hashes of the album's songs (disc, track).
        durationInSeconds:
          type: integer
          description: Total duration of all songs in the album.
        artist:
          $ref: '#/components/schemas/ArtistDto'

    AlbumPageDto:
      type: object
      required:
        - content
        - page
        - size
        - totalElements
        - totalPages
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/AlbumExpandedDto'
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 1
        totalElements:
          type: integer
          format: int64
          minimum: 0
        totalPages:
          type: integer
          minimum: 0

    PlaylistDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        indestructible:
          type: boolean
          default: false
          description: When true, the playlist cannot be deleted by the user.
        songFileHashes:
          type: array
          items:
            type: string
          description: Ordered song file hashes for this playlist (index equals playlist position).

    PlaylistExpandedDto:
      type: object
      description: Playlist detail used in paginated list responses. Includes song metadata.
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        indestructible:
          type: boolean
          default: false
          description: When true, the playlist cannot be deleted by the user.
        songFileHashes:
          type: array
          items:
            type: string
          description: Ordered song file hashes for this playlist (index equals playlist position).
        durationInSeconds:
          type: integer
          description: Total duration of all songs in the playlist.

    PlaylistPageDto:
      type: object
      required:
        - content
        - page
        - size
        - totalElements
        - totalPages
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/PlaylistDto'
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 1
        totalElements:
          type: integer
          format: int64
          minimum: 0
        totalPages:
          type: integer
          minimum: 0

    CreatePlaylistDto:
      type: object
      required:
        - name
        - playlistSongs
      properties:
        name:
          type: string
        playlistSongs:
          type: array
          items:
            $ref: '#/components/schemas/PlaylistSongPositionDto'
          default: [ ]
          description: Song file hashes with explicit playlist positions.
        coverImage:
          type: string
          description: Base64-encoded cover image (optional)

    UpdatePlaylistDto:
      type: object
      properties:
        name:
          type: string
          nullable: true
        playlistSongs:
          type: array
          items:
            $ref: '#/components/schemas/PlaylistSongPositionDto'
          nullable: true
          description: When present, replaces playlist songs using these explicit positions.
        coverImage:
          type: string
          nullable: true
          description: Base64-encoded cover image; empty string to remove existing cover

    PlaybackStateDto:
      type: object
      properties:
        positionSeconds:
          type: integer
          format: int64
          default: 0
        shuffle:
          type: boolean
          default: false
        repeat:
          type: boolean
          default: false
        autoPlay:
          type: boolean
          default: false
        autoPlayRecommendationsPage:
          type: integer
          format: int64
          minimum: 0
          default: 0
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    PlaylistSongPositionDto:
      type: object
      required:
        - songFileHash
        - position
      properties:
        songFileHash:
          type: string
        position:
          type: integer
          minimum: 0

    PlaylistSongDto:
      type: object
      required:
        - song
        - position
      properties:
        song:
          $ref: '#/components/schemas/SongDto'
        position:
          type: integer
          minimum: 0

    SongDto:
      type: object
      properties:
        fileHash:
          type: string
        name:
          type: string
        artist:
          $ref: '#/components/schemas/ArtistDto'
        album:
          $ref: '#/components/schemas/AlbumDto'
        durationInSeconds:
          type: integer
        trackNumber:
          type: integer
        discNumber:
          type: integer
        year:
          type: integer
        lastPlayed:
          type: string
          format: date-time
          nullable: true
          description: When the requesting user last played this song; null if never.
        playCount:
          type: integer
          format: int64
          default: 0
          description: How many times the requesting user has played this song.
        likedByUser:
          type: boolean
          default: false
          description: Whether the requesting user has liked this song.

    UpdateUserSongDto:
      type: object
      description: Patch payload for the requesting user's library entry for a song.
      properties:
        likedByUser:
          type: boolean
          nullable: true
        lastPlayed:
          type: string
          format: date-time
          nullable: true
        playCount:
          type: integer
          format: int64
          nullable: true
          minimum: 0

    LyricsDto:
      type: object
      required:
        - lyrics
      properties:
        lyrics:
          type: string
          minLength: 1
          maxLength: 500000

    SongUploadDto:
      type: object
      required:
        - file
        - name
        - artistName
        - albumName
      properties:
        file:
          type: string
          format: binary
          description: The audio file (MP3, FLAC, WAV)
        name:
          type: string
        artistName:
          type: string
        albumName:
          type: string
        durationInSeconds:
          type: integer
        trackNumber:
          type: integer
        releaseYear:
          type: integer
        discNumber:
          type: integer
        photo:
          type: string
          description: Base64-encoded album art image
        fileHash:
          type: string
          description: The SHA-256 hash of the entire file for quick server-side duplicate detection.


    ChunkManifestDto:
      type: object
      properties:
        fileHash:
          type: string
        chunkSize:
          type: integer
        totalChunks:
          type: integer
        totalBytes:
          type: integer
          format: int64
        hashes:
          type: array
          items:
            type: string

    EmailRequest:
      type: object
      properties:
        email:
          type: string

    VerificationRequest:
      type: object
      properties:
        email:
          type: string
        code:
          type: string

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT access token for authenticated requests
        refreshToken:
          type: string
          description: JWT refresh token for obtaining new access tokens

    NegotiationRequestDto:
      type: object
      required:
        - name
        - hashes
      properties:
        name:
          type: string
        artistName:
          type: string
        albumName:
          type: string
        durationInSeconds:
          type: integer
        discNumber:
          type: integer
        trackNumber:
          type: integer
        releaseYear:
          type: integer
        photo:
          type: string
          description: Base64-encoded album art image
        fileHash:
          type: string
          description: The SHA-256 hash of the entire file for quick server-side duplicate detection.
        hashes:
          type: array
          description: The sequential list of SHA-256 hashes for the file chunks.
          items:
            type: string

    NegotiationResponseDto:
      type: object
      required:
        - fileHash
        - missingIndices
      properties:
        fileHash:
          type: string
        missingIndices:
          type: array
          description: The indices (0-based) of the chunks the server DOES NOT have.
          items:
            type: integer

    SongPageDto:
      type: object
      required:
        - content
        - page
        - size
        - totalElements
        - totalPages
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/SongDto'
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 1
        totalElements:
          type: integer
          format: int64
          minimum: 0
        totalPages:
          type: integer
          minimum: 0

    ChunkStatDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        timestamp:
          type: string
          format: date-time
          readOnly: true
        userId:
          type: integer
          format: int64
          readOnly: true
        songFileHash:
          type: string
        songName:
          type: string
        localChunks:
          type: integer
        localCachedChunks:
          type: integer
        p2pChunks:
          type: integer
        serverChunks:
          type: integer
        totalChunks:
          type: integer
          readOnly: true
        p2pPercentage:
          type: number
          format: double
          readOnly: true

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
