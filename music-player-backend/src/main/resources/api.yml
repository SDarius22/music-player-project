openapi: 3.1.1
info:
  title: Peer-Assisted Music Streaming API
  description: Backend API for hybrid prefix caching, predictive pre-fetching, and master fallback.
  version: 1.0.0
servers:
  - url: /api/v1

paths:
  /songs:
    get:
      summary: Get all songs
      description: Retrieves the metadata for all songs.
      operationId: getAllSongs
      tags:
        - Songs
      responses:
        '200':
          description: A list of songs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SongDto'
    post:
      summary: Upload a new song
      description: Ingests a raw audio file (MP3/FLAC), deduplicates chunks, and stores metadata.
      operationId: uploadSong
      tags:
        - Songs
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SongUploadDto'

      responses:
        '201':
          description: Song created and chunks processed
        '400':
          description: Invalid input

  /songs/negotiate:
    post:
      summary: Negotiate a user upload
      description: Client sends metadata and chunk hashes. Server returns ID and list of missing chunk indices.
      operationId: negotiateUserUpload
      tags:
        - Songs
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NegotiationRequestDto'
      responses:
        '200':
          description: Negotiation successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NegotiationResponseDto'

  /songs/{songId}:
    get:
      summary: Get song metadata
      description: Retrieves metadata for a specific song by ID.
      operationId: getSongById
      tags:
        - Songs
      parameters:
        - name: songId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Song metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SongDto'
        '404':
          description: Song not found

  /songs/{songId}/chunks/{chunkIndex}:
    post:
      summary: Upload a missing chunk
      description: Uploads a specific 64KB binary chunk to fill a gap in a user song.
      operationId: uploadMissingChunk
      tags:
        - Songs
      security:
        - bearerAuth: [ ]
      parameters:
        - name: songId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: chunkIndex
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - chunkData
                - contentHash
              properties:
                chunkData:
                  type: string
                  format: binary
                contentHash:
                  type: string
                  description: The SHA-256 hash of this chunk for verification.
      responses:
        '201':
          description: Chunk accepted and linked
        '400':
          description: Hash mismatch or invalid index

  /stream/{songId}/prefix:
    get:
      summary: Get song prefix
      operationId: getSongPrefix
      tags:
        - Streaming
      parameters:
        - name: songId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: prefixBytes
          in: query
          required: false
          schema:
            type: integer
            default: 512000
      responses:
        '200':
          description: Audio byte stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Song or file not found

  /stream/{songId}/full:
    get:
      summary: Master fallback full stream
      operationId: getFullStream
      tags:
        - Streaming
      parameters:
        - name: songId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Audio stream
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
        '206':
          description: Partial content
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary

  /stream/{songId}/manifest:
    get:
      summary: Get chunk manifest
      operationId: getSongManifest
      tags:
        - Streaming
      parameters:
        - name: songId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Chunk manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChunkManifestDto'

  /stream/{songId}/chunk/{chunkIndex}:
    get:
      summary: Get specific chunk
      operationId: getSongChunk
      tags:
        - Streaming
      parameters:
        - name: songId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: chunkIndex
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Binary chunk data
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /sync:
    post:
      summary: Delta sync for user library
      description: |
        Performs a bi-directional delta sync. 
        1. Client sends its 'lastSyncTimestamp' and a list of local changes (adds/updates/soft-deletes).
        2. Server applies valid local changes.
        3. Server returns a 'newSyncTimestamp' and a list of changes from OTHER devices that happened since the client's last sync.
      operationId: syncUserLibrary
      tags:
        - Sync
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncRequestDto'
      responses:
        '200':
          description: Sync successful. Returns server updates and new anchor timestamp.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncResponseDto'
        '400':
          description: Invalid timestamp format or malformed DTOs.
        '401':
          description: Unauthorized.

  /auth/send-code:
    post:
      summary: Send verification code
      operationId: sendVerificationCode
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailRequest'
      responses:
        '200':
          description: Code sent

  /auth/verify:
    post:
      summary: Verify authentication code
      operationId: verifyAuthenticationCode
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerificationRequest'
      responses:
        '200':
          description: Token returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /auth/refresh:
    post:
      summary: Refresh access token
      operationId: refreshAccessToken
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: New access token returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid or expired refresh token

  /auth/google:
    post:
      summary: Google OAuth login
      operationId: googleOAuthLogin
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - idToken
              properties:
                idToken:
                  type: string
                  description: The ID token obtained from Google's OAuth flow on the client side.
      responses:
        '200':
          description: Token returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid Google ID token

components:
  schemas:
    ArtistDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string

    AlbumDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        photo:
          type: string


    SongDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        artist:
          $ref: '#/components/schemas/ArtistDto'
        album:
          $ref: '#/components/schemas/AlbumDto'
        durationInSeconds:
          type: integer
        trackNumber:
          type: integer
        discNumber:
          type: integer
        year:
          type: integer

    SongSyncDto:
      type: object
      description: Represents a change to a specific song in the user's library.
      required:
        - songId
      properties:
        songId:
          type: integer
          format: int64

        playCountDelta:
          type: integer
          default: 0

        likedByUser:
          type: boolean
          nullable: true

        lastPlayed:
          type: string
          format: date-time
          nullable: true

        addedAt:
          type: string
          format: date-time
          nullable: true

        isDeleted:
          type: boolean
          default: false

    SongUploadDto:
      type: object
      required:
        - file
        - name
        - artistName
        - albumName
      properties:
        file:
          type: string
          format: binary
          description: The audio file (MP3, FLAC, WAV)
        name:
          type: string
        artistName:
          type: string
        albumName:
          type: string
        durationInSeconds:
          type: integer
        trackNumber:
          type: integer
        releaseYear:
          type: integer
        discNumber:
          type: integer
        photo:
          type: string
          description: Base64-encoded album art image


    ChunkManifestDto:
      type: object
      properties:
        songId:
          type: integer
          format: int64
        chunkSize:
          type: integer
        totalChunks:
          type: integer
        totalBytes:
          type: integer
          format: int64
        hashes:
          type: array
          items:
            type: string

    EmailRequest:
      type: object
      properties:
        email:
          type: string

    VerificationRequest:
      type: object
      properties:
        email:
          type: string
        code:
          type: string

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT access token for authenticated requests
        refreshToken:
          type: string
          description: JWT refresh token for obtaining new access tokens

    NegotiationRequestDto:
      type: object
      required:
        - name
        - hashes
      properties:
        name:
          type: string
        artistName:
          type: string
        albumName:
          type: string
        durationInSeconds:
          type: integer
        discNumber:
          type: integer
        trackNumber:
          type: integer
        releaseYear:
          type: integer
        photo:
          type: string
          description: Base64-encoded album art image
        hashes:
          type: array
          description: The sequential list of SHA-256 hashes for the file chunks.
          items:
            type: string

    NegotiationResponseDto:
      type: object
      required:
        - songId
        - missingIndices
      properties:
        songId:
          type: integer
          format: int64
        missingIndices:
          type: array
          description: The indices (0-based) of the chunks the server DOES NOT have.
          items:
            type: integer

    SyncRequestDto:
      type: object
      required:
        - lastSyncTime
        - localChanges
      properties:
        lastSyncTime:
          type: string
          format: date-time
        localChanges:
          type: array
          items:
            $ref: '#/components/schemas/SongSyncDto'

    SyncResponseDto:
      type: object
      properties:
        serverChanges:
          type: array
          items:
            $ref: '#/components/schemas/SongSyncDto'
        newSyncTime:
          type: string
          format: date-time
  
  
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT