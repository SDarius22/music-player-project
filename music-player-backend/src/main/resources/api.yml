openapi: 3.0.3
info:
  title: Peer-Assisted Music Streaming API
  description: Backend API for hybrid prefix caching, predictive pre-fetching, and master fallback.
  version: 1.0.0
servers:
  - url: /api/v1

paths:
  /songs:
    get:
      summary: Get all songs
      description: Retrieves the metadata for all songs to sync with the local ObjectBox database.
      operationId: getAllSongs
      tags:
        - Song Metadata
      responses:
        '200':
          description: A list of songs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SongDto'
  /stream/{songId}/prefix:
    get:
      summary: Get song prefix
      description: Streams the first N bytes of the audio file to populate the client's edge cache.
      operationId: getSongPrefix
      tags:
        - Streaming & Caching
      parameters:
        - name: songId
          in: path
          required: true
          schema:
            type: long
        - name: prefixBytes
          in: query
          required: false
          schema:
            type: integer
            default: 512000
      responses:
        '200':
          description: Audio byte stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Song or file not found
  /stream/{songId}/full:
    get:
      summary: Master fallback full stream
      description: Streams the entire file natively, supporting HTTP 206 Partial Content and Range headers.
      operationId: getFullStream
      tags:
        - Streaming & Caching
      parameters:
        - name: songId
          in: path
          required: true
          schema:
            type: long
      responses:
        '200':
          description: Audio stream
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
        '206':
          description: Partial audio stream (for seeking)
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
        '404':
          description: Song or file not found
  /stream/{songId}/manifest:
    get:
      summary: Get chunk cryptographic manifest
      description: Returns fixed-size chunk hashes for P2P integrity verification.
      operationId: getSongManifest
      tags:
        - Streaming & Caching
      parameters:
        - name: songId
          in: path
          required: true
          schema:
            type: long
      responses:
        '200':
          description: Chunk manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChunkManifestDto'
  /stream/{songId}/chunk/{chunkIndex}:
    get:
      summary: Master fallback for a specific chunk
      description: Returns the exact binary data for a specific chunk index.
      operationId: getSongChunk
      tags:
        - Streaming & Caching
      parameters:
        - name: songId
          in: path
          required: true
          schema:
            type: long
        - name: chunkIndex
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Binary chunk data
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
  /sync:
    post:
      summary: Sync offline data
      description: Applies conflict resolution to sync offline mobile data with the master database.
      operationId: syncOfflineData
      tags:
        - Data Sync

      security:
        - bearerAuth: [ ]

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/SongSyncDto'
      responses:
        '200':
          description: Sync completed successfully
  /auth/send-code:
    post:
      summary: Send verification code
      description: Sends a verification code to the user's email for authentication.
      operationId: sendVerificationCode
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailRequest'
      responses:
        '200':
          description: Verification code sent successfully
  /auth/verify:
    post:
      summary: Verify authentication code
      description: Verifies the code sent to the user's email and returns an authentication token.
      operationId: verifyAuthenticationCode
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerificationRequest'
      responses:
        '200':
          description: Authentication successful, token returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid verification code or email

components:
  schemas:
    ArtistDto:
      type: object
      required:
        - name
      properties:
        id:
          type: long
          readOnly: true
        name:
          type: string
          maxLength: 255

    AlbumDto:
      type: object
      required:
        - name
      properties:
        id:
          type: long
          readOnly: true
        name:
          type: string
          maxLength: 255

    SongDto:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: long
          readOnly: true
        name:
          type: string
          maxLength: 255
        artist:
          $ref: '#/components/schemas/ArtistDto'
        album:
          $ref: '#/components/schemas/AlbumDto'
        photo:
          type: string
          maxLength: 255
          nullable: true
        durationInSeconds:
          type: integer
          minimum: 0
          nullable: true
        trackNumber:
          type: integer
          minimum: 1
          nullable: true
        discNumber:
          type: integer
          minimum: 1
          nullable: true
        year:
          type: integer
          nullable: true
    SongSyncDto:
      type: object
      required:
        - songId
        - playCountDelta
        - likedByUser
      properties:
        songId:
          type: long
        playCountDelta:
          type: integer
          minimum: 0
          description: The number of new plays since the last successful sync.
        likedByUser:
          type: boolean
        lastPlayed:
          type: string
          format: date-time
          nullable: true
    ChunkManifestDto:
      type: object
      required:
        - songId
        - chunkSize
        - totalChunks
        - hashes
      properties:
        songId:
          type: long
        chunkSize:
          type: integer
          description: The fixed byte size of each chunk (except potentially the last one).
        totalChunks:
          type: integer
        totalBytes:
          type: long
          description: The total size of the audio file in bytes.
        hashes:
          type: array
          description: SHA-256 checksums for each chunk in sequential order.
          items:
            type: string
    EmailRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
    VerificationRequest:
      type: object
      required:
        - email
        - code
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          maxLength: 6
    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT authentication token
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT