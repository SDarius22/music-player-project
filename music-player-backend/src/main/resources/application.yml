server:
  port: 9000
  compression:
    enabled: true
    mime-types: application/json,text/css,application/javascript
    min-response-size: 1024
  servlet:
    session:
      timeout: 30m

spring:
  application:
    name: music-player-backend

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:music_player_db}
    username: ${DB_USER:admin}
    password: ${DB_USER:admin}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      idle-timeout: 600000 # 10 minutes
      max-lifetime: 1800000 # 30 minutes

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 100

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

logging:
  level:
    root: INFO
    # Crucial for debugging your WebRTC signaling handshakes
    org.springframework.web.socket: DEBUG
    # Tracks your custom business logic
    com.example.musicplayerbackend: DEBUG
    # Uncomment to trace database connection issues
    # com.zaxxer.hikari: DEBUG