server:
  port: 9000
  forward-headers-strategy: framework
  compression:
    enabled: true
    mime-types: application/json,text/css,application/javascript
    min-response-size: 1024
  servlet:
    session:
      timeout: 30m
  tomcat:
    max-http-form-post-size: 100MB
    max-swallow-size: 100MB

spring:
  application:
    name: music-player-backend
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:music_player_db}
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      idle-timeout: 600000 # 10 minutes
      max-lifetime: 1800000 # 30 minutes
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
        default_schema: music_library
  liquibase:
    change-log: classpath:db/changelog/changelog.yml
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  mail:
    host: ${MAIL_HOST}
    port: 587
    username: ${MAIL_USER}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 110MB

application:
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:[*],http://127.0.0.1:[*]}

logging:
  level:
    root: INFO
    org.springframework.web.socket: DEBUG
    com.example.musicplayerbackend: DEBUG

music:
  storage:
    chunk-root: ${MUSIC_CHUNK_STORAGE_ROOT:${user.home}/music-server/chunks}
