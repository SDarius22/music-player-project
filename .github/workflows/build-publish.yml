name: Build and Publish Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - working-directory: ./music-player-frontend
        run: flutter pub get

      - working-directory: ./music-player-frontend
        run: dart run build_runner build --delete-conflicting-outputs

      - working-directory: ./music-player-frontend
        run: flutter test

  build:
    needs: test
    name: Build on ${{ matrix.os }} for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: apk
            build_cmd: flutter build apk --release --dart-define=API_BASE_URL=https://api.dariussala.com/music-player --dart-define=WS_BASE_URL=wss://wss.dariussala.com/music-player/signaling
            artifact_name: music-player-android
            artifact_path: music-player-frontend/build/app/outputs/flutter-apk/app-release.apk

          - os: ubuntu-latest
            target: linux
            build_cmd: flutter build linux --release --dart-define=API_BASE_URL=https://api.dariussala.com/music-player --dart-define=WS_BASE_URL=wss://wss.dariussala.com/music-player/signaling
            artifact_name: music-player-linux
            artifact_path: music-player-frontend/music-player-linux.tar.gz

          - os: windows-latest
            target: windows
            build_cmd: flutter build windows --release --dart-define=API_BASE_URL=https://api.dariussala.com/music-player --dart-define=WS_BASE_URL=wss://wss.dariussala.com/music-player/signaling
            artifact_name: music-player-windows
            artifact_path: music-player-frontend/music-player-windows.zip

          - os: macos-latest
            target: macos
            build_cmd: flutter build macos --release --config-only --dart-define=API_BASE_URL=https://api.dariussala.com/music-player --dart-define=WS_BASE_URL=wss://wss.dariussala.com/music-player/signaling && xcodebuild -workspace macos/Runner.xcworkspace -scheme Runner -configuration Release -derivedDataPath build/macos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" PROVISIONING_PROFILE_SPECIFIER="" DEVELOPMENT_TEAM=""
            artifact_name: music-player-macos
            artifact_path: music-player-frontend/music-player-macos.zip

          - os: macos-latest
            target: ios
            build_cmd: flutter build ipa --release --no-codesign --dart-define=API_BASE_URL=https://api.dariussala.com/music-player --dart-define=WS_BASE_URL=wss://wss.dariussala.com/music-player/signaling
            artifact_name: music-player-ios
            artifact_path: music-player-frontend/music-player.ipa

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev libjsoncpp-dev libmpv-dev mpv libayatana-appindicator3-dev

      - working-directory: ./music-player-frontend
        run: flutter pub get

      - working-directory: ./music-player-frontend
        run: ${{ matrix.build_cmd }}

      - if: matrix.target == 'linux'
        working-directory: ./music-player-frontend
        run: tar -czvf music-player-linux.tar.gz -C build/linux/x64/release/bundle .

      - if: matrix.target == 'windows'
        working-directory: ./music-player-frontend
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath music-player-windows.zip

      - if: matrix.target == 'macos'
        working-directory: ./music-player-frontend
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../music-player-macos.zip *.app

      - if: matrix.target == 'ios'
        working-directory: ./music-player-frontend
        run: |
          ipa_path=$(ls build/ios/ipa/*.ipa | head -n 1)
          cp "$ipa_path" music-player.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  deploy-to-server-primary:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./downloads

      - id: scp_primary
        uses: appleboy/scp-action@v0.1.7
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "./downloads/*"
          target: "/var/www/music-player-downloads/"
          strip_components: 1

      - name: Validate primary binary publish
        if: always()
        run: |
          if [ "${{ steps.scp_primary.outcome }}" = "success" ]; then
            echo "Primary binary publish upload succeeded."
          else
            echo "Primary binary publish upload failed."
            exit 1
          fi

  deploy-to-server-cluj:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./downloads

      - id: scp_cluj
        uses: appleboy/scp-action@v0.1.7
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST_CLUJ }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "./downloads/*"
          target: "/var/www/music-player-downloads/"
          strip_components: 1

      - name: Validate Cluj binary publish
        if: always()
        run: |
          if [ "${{ steps.scp_cluj.outcome }}" = "success" ]; then
            echo "Cluj binary publish upload succeeded."
          else
            echo "Cluj binary publish upload failed."
            exit 1
          fi

