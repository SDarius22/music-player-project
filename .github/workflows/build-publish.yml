name: Build and Publish Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux integration test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev libjsoncpp-dev libmpv-dev mpv libayatana-appindicator3-dev xvfb

      - run: flutter config --enable-linux-desktop

      - working-directory: ./music-player-frontend
        run: flutter pub get

      - working-directory: ./music-player-frontend
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze Dart
        working-directory: ./music-player-frontend
        run: flutter analyze --fatal-infos

      - name: Test with coverage
        working-directory: ./music-player-frontend
        run: flutter test --coverage

      - name: Enforce 85% line coverage
        working-directory: ./music-player-frontend
        run: |
          awk -F: '
            /^LF:/ { total += $2 }
            /^LH:/ { covered += $2 }
            END {
              if (total == 0) exit 1
              coverage = covered * 100 / total
              printf "Frontend line coverage: %.2f%% (%d/%d)\n", coverage, covered, total
              if (coverage < 85) exit 1
            }
          ' coverage/lcov.info

      - name: Enforce frontend duplication budget
        working-directory: ./music-player-frontend
        run: >-
          npx --yes jscpd@4.0.8
          --threshold 5
          --format dart
          --ignore '**/*.g.dart,**/generated/**'
          lib

      - name: Scan frontend dependencies for CVEs
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: music-player-frontend
          scanners: vuln
          vuln-type: library
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: '1'

      - name: Run Flutter integration tests
        working-directory: ./music-player-frontend
        run: |
          flutter test test/core/integration/song_playlist_flow_test.dart
          xvfb-run -a flutter test integration_test/song_provider_flow_test.dart -d linux
          xvfb-run -a flutter test integration_test/album_provider_flow_test.dart -d linux
          xvfb-run -a flutter test integration_test/playlist_provider_flow_test.dart -d linux
          xvfb-run -a flutter test integration_test/artist_provider_flow_test.dart -d linux

  build:
    needs: test
    name: Build ${{ matrix.target }} for ${{ matrix.site_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        site: [dariussala]
        target: [apk, linux, windows, macos, ios]
        include:
          - site: dariussala
            site_name: dariussala.com
            api_base_url: https://api.dariussala.com/music-player
            ws_base_url: wss://wss.dariussala.com/music-player/signaling
            download_base_url: https://music.dariussala.com/downloads

          - target: apk
            os: ubuntu-24.04
            build_cmd: flutter build apk --release
            artifact_name: music-player-android
            artifact_path: music-player-frontend/build/app/outputs/flutter-apk/app-release.apk

          - target: linux
            os: ubuntu-24.04
            build_cmd: flutter build linux --release
            artifact_name: music-player-linux
            artifact_path: music-player-frontend/music-player-linux.tar.gz

          - target: windows
            os: windows-2022
            build_cmd: flutter build windows --release
            artifact_name: music-player-windows
            artifact_path: music-player-frontend/music-player-windows.zip

          - target: macos
            os: macos-14
            build_cmd: flutter build macos --release --config-only
            artifact_name: music-player-macos
            artifact_path: music-player-frontend/music-player-macos.zip

          - target: ios
            os: macos-14
            build_cmd: flutter build ipa --release --no-codesign
            artifact_name: music-player-ios
            artifact_path: music-player-frontend/music-player.ipa

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev libjsoncpp-dev libmpv-dev mpv libayatana-appindicator3-dev

      - working-directory: ./music-player-frontend
        run: flutter pub get

      - working-directory: ./music-player-frontend
        run: ${{ matrix.build_cmd }} --dart-define=API_BASE_URL=${{ matrix.api_base_url }} --dart-define=WS_BASE_URL=${{ matrix.ws_base_url }} --dart-define=DOWNLOAD_BASE_URL=${{ matrix.download_base_url }}

      - if: matrix.target == 'macos'
        working-directory: ./music-player-frontend
        run: xcodebuild -workspace macos/Runner.xcworkspace -scheme Runner -configuration Release -derivedDataPath build/macos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" PROVISIONING_PROFILE_SPECIFIER="" DEVELOPMENT_TEAM=""

      - if: matrix.target == 'linux'
        working-directory: ./music-player-frontend
        run: tar -czvf music-player-linux.tar.gz -C build/linux/x64/release/bundle .

      - if: matrix.target == 'windows'
        working-directory: ./music-player-frontend
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath music-player-windows.zip

      - if: matrix.target == 'macos'
        working-directory: ./music-player-frontend
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../music-player-macos.zip *.app

      - if: matrix.target == 'ios'
        working-directory: ./music-player-frontend
        run: |
          # --no-codesign skips IPA generation, so build it manually from the xcarchive.
          rm -rf Payload
          mkdir Payload
          cp -R build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app Payload/
          zip -qry music-player.ipa Payload
          rm -rf Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.site }}-${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  deploy-to-server-cluj:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dariussala-*
          path: ./downloads

      - name: Prepare Cluj dariussala.com artifacts
        run: |
          rm -rf ./publish
          mkdir -p ./publish

          shopt -s nullglob
          artifact_dirs=(./downloads/dariussala-*)

          if [ ${#artifact_dirs[@]} -eq 0 ]; then
            echo "No dariussala.com artifacts were downloaded."
            exit 1
          fi

          for artifact_dir in "${artifact_dirs[@]}"; do
            target_name="$(basename "$artifact_dir")"
            target_name="${target_name#dariussala-}"
            mkdir -p "./publish/$target_name"
            cp -R "$artifact_dir/." "./publish/$target_name/"
          done

      - id: scp_cluj
        uses: appleboy/scp-action@v0.1.7
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST_CLUJ }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "./publish/*"
          target: "/var/www/music-player-downloads/"
          strip_components: 1

      - name: Validate Cluj binary publish
        if: always()
        run: |
          if [ "${{ steps.scp_cluj.outcome }}" = "success" ]; then
            echo "Cluj binary publish upload succeeded."
          else
            echo "Cluj binary publish upload failed."
            exit 1
          fi
