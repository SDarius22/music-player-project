name: Deploy Backend

on:
  push:
    branches:
      - master
    paths:
      - 'music-player-backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Test and enforce 85% line coverage
        working-directory: ./music-player-backend
        run: mvn --batch-mode clean verify

      - name: Check style
        working-directory: ./music-player-backend
        run: mvn --batch-mode org.apache.maven.plugins:maven-checkstyle-plugin:3.6.0:check

      - name: Find code defects
        working-directory: ./music-player-backend
        run: mvn --batch-mode com.github.spotbugs:spotbugs-maven-plugin:4.9.8.2:check

      - name: Find code issues and duplication
        working-directory: ./music-player-backend
        run: >-
          mvn --batch-mode
          org.apache.maven.plugins:maven-pmd-plugin:3.28.0:check
          org.apache.maven.plugins:maven-pmd-plugin:3.28.0:cpd-check

      - name: Scan backend dependencies for CVEs
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: music-player-backend
          scanners: vuln
          vuln-type: library
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: '1'

      - name: Upload backend coverage
        uses: codecov/codecov-action@v5
        with:
          files: music-player-backend/target/site/jacoco/jacoco.xml
          flags: backend
          fail_ci_if_error: true
          use_oidc: true

  build:
    needs: test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - working-directory: ./music-player-backend
        run: mvn --batch-mode clean package -DskipTests

      - working-directory: ./music-player-backend
        run: docker build -t ghcr.io/sdarius22/music-player-project/music-player-backend:latest .

      - name: Scan the publishable backend image for CVEs
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/sdarius22/music-player-project/music-player-backend:latest
          scanners: vuln
          vuln-type: os,library
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: '1'

      - uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: docker push ghcr.io/sdarius22/music-player-project/music-player-backend:latest

  deploy-cluj:
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - id: scp_cluj
        uses: appleboy/scp-action@v0.1.7
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST_CLUJ }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "music-player-backend/docker-compose.yml"
          target: "/home/deployer/music-player/"
          strip_components: 1

      - id: ssh_cluj
        uses: appleboy/ssh-action@v1.0.0
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST_CLUJ }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/deployer/music-player

            mkdir -p goaccess-report

            docker info --format '{{.Swarm.LocalNodeState}}' | grep -q active || docker swarm init

            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker pull ghcr.io/sdarius22/music-player-project/music-player-backend:latest

            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            export MAIL_HOST="${{ secrets.MAIL_HOST_CLUJ }}"
            export MAIL_USER="${{ secrets.MAIL_USER_CLUJ }}"
            export MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD_CLUJ }}"
            export CORS_ALLOWED_ORIGINS="${{ secrets.CORS_ALLOWED_ORIGINS }}"

            docker stack deploy -c docker-compose.yml --with-registry-auth music-player

      - name: Validate Cluj deployment
        if: always()
        run: |
          if [ "${{ steps.ssh_cluj.outcome }}" = "success" ]; then
            echo "Cluj VPS deployment succeeded."
          else
            echo "Cluj VPS deployment failed."
            exit 1
          fi
