name: Deploy Backend

on:
  push:
    branches:
      - master
    paths:
      - 'music-player-backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          java-version: '25'
          distribution: 'temurin'

      - working-directory: ./music-player-backend
        run: mvn test

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          java-version: '25'
          distribution: 'temurin'

      - working-directory: ./music-player-backend
        run: mvn clean package -DskipTests

      - uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - working-directory: ./music-player-backend
        run: docker build -t ghcr.io/sdarius22/music-player-project/music-player-backend:latest .

      - run: docker push ghcr.io/sdarius22/music-player-project/music-player-backend:latest

      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "music-player-backend/docker-compose.yml"
          target: "/home/docker-data/"
          strip_components: 1

      - uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/docker-data/

            mkdir -p goaccess-report

            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker pull ghcr.io/sdarius22/music-player-project/music-player-backend:latest

            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            export MAIL_HOST="${{ secrets.MAIL_HOST }}"
            export MAIL_USER="${{ secrets.MAIL_USER }}"
            export MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}"

            docker compose up -d --remove-orphans --scale backend=2
