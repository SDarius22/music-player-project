name: Deploy Backend

on:
  push:
    branches:
      - master
    paths:
      - 'music-player-backend/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          java-version: '25'
          distribution: 'temurin'

      - run: chmod +x mvnw

      - run: ./mvnw clean package -DskipTests

      - uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: docker build -t ghcr.io/${{ github.repository }}/music-player-backend:latest .

      - run: docker push ghcr.io/${{ github.repository }}/music-player-backend:latest

      - uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository }}/music-player-backend:latest
            docker stop music-backend || true
            docker rm music-backend || true
            docker run -d \
              --name music-backend \
              --restart unless-stopped \
              -p 8080:8080 \
              -v /opt/music-data:/app/STORAGE_ROOT \
              ghcr.io/${{ github.repository }}/music-player-backend:latest

