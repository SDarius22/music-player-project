name: Deploy Frontend

on:
  push:
    branches:
      - master
    paths:
      - 'music-player-frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      lib-changed: ${{ steps.filter.outputs.lib }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            lib:
              - 'music-player-frontend/lib/**'
              - 'music-player-frontend/test/**'
              - 'music-player-frontend/integration_test/**'
              - 'music-player-frontend/pubspec.yaml'
              - 'music-player-frontend/pubspec.lock'

  test:
    needs: check-changes
    if: needs.check-changes.outputs.lib-changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux integration test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev libjsoncpp-dev libmpv-dev mpv libayatana-appindicator3-dev xvfb

      - run: flutter config --enable-linux-desktop

      - working-directory: ./music-player-frontend
        run: flutter pub get

      - working-directory: ./music-player-frontend
        run: dart run build_runner build --delete-conflicting-outputs

      - working-directory: ./music-player-frontend
        run: flutter test

      - name: Run Flutter integration tests
        working-directory: ./music-player-frontend
        run: |
          flutter test test/core/integration/song_playlist_flow_test.dart
          xvfb-run -a flutter test integration_test/song_provider_flow_test.dart -d linux
          xvfb-run -a flutter test integration_test/album_provider_flow_test.dart -d linux
          xvfb-run -a flutter test integration_test/playlist_provider_flow_test.dart -d linux
          xvfb-run -a flutter test integration_test/artist_provider_flow_test.dart -d linux

  build-and-deploy-primary:
    needs: [check-changes, test]
    if: always() && needs.check-changes.result == 'success' && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - working-directory: ./music-player-frontend
        run: flutter pub get

      - working-directory: ./music-player-frontend
        run: flutter build web -t lib/main_web.dart --base-href / --pwa-strategy=none --release --dart-define=API_BASE_URL=https://api.bt-app.com/music-player --dart-define=WS_BASE_URL=wss://wss.bt-app.com/music-player/signaling --dart-define=DOWNLOAD_BASE_URL=https://music.bt-app.com/downloads

      - id: ssh_primary
        uses: appleboy/ssh-action@v1.0.0
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            rm -rf /var/www/music-frontend/*

      - id: scp_primary
        uses: appleboy/scp-action@v0.1.7
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "music-player-frontend/build/web/*"
          target: "/var/www/music-frontend"
          strip_components: 3

      - name: Validate primary deployment
        if: always()
        run: |
          if [ "${{ steps.scp_primary.outcome }}" = "success" ]; then
            echo "Primary VPS deployment succeeded."
          else
            echo "Primary VPS deployment failed."
            exit 1
          fi

  build-and-deploy-cluj:
    needs: [check-changes, test]
    if: always() && needs.check-changes.result == 'success' && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - working-directory: ./music-player-frontend
        run: flutter pub get

      - working-directory: ./music-player-frontend
        run: flutter build web -t lib/main_web.dart --base-href / --pwa-strategy=none --release --dart-define=API_BASE_URL=https://api.dariussala.com/music-player --dart-define=WS_BASE_URL=wss://wss.dariussala.com/music-player/signaling --dart-define=DOWNLOAD_BASE_URL=https://music.dariussala.com/downloads

      - id: ssh_cluj
        uses: appleboy/ssh-action@v1.0.0
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST_CLUJ }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            rm -rf /var/www/music-frontend/*

      - id: scp_cluj
        uses: appleboy/scp-action@v0.1.7
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST_CLUJ }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "music-player-frontend/build/web/*"
          target: "/var/www/music-frontend"
          strip_components: 3

      - name: Validate Cluj deployment
        if: always()
        run: |
          if [ "${{ steps.scp_cluj.outcome }}" = "success" ]; then
            echo "Cluj VPS deployment succeeded."
          else
            echo "Cluj VPS deployment failed."
            exit 1
          fi
