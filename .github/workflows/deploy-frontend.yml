name: Deploy Frontend

on:
  push:
    branches:
      - master
    paths:
      - 'music-player-frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux integration test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev libjsoncpp-dev libmpv-dev mpv libayatana-appindicator3-dev xvfb

      - run: flutter config --enable-linux-desktop

      - working-directory: ./music-player-frontend
        run: flutter pub get

      - working-directory: ./music-player-frontend
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze Dart
        working-directory: ./music-player-frontend
        run: flutter analyze --fatal-infos

      - name: Test with coverage
        working-directory: ./music-player-frontend
        run: flutter test --coverage

      - name: Enforce 85% line coverage
        working-directory: ./music-player-frontend
        run: |
          awk -F: '
            /^LF:/ { total += $2 }
            /^LH:/ { covered += $2 }
            END {
              if (total == 0) exit 1
              coverage = covered * 100 / total
              printf "Frontend line coverage: %.2f%% (%d/%d)\n", coverage, covered, total
              if (coverage < 85) exit 1
            }
          ' coverage/lcov.info

      - name: Enforce zero duplicated code
        working-directory: ./music-player-frontend
        run: >-
          npx --yes jscpd@4.0.8
          --threshold 0
          --format dart
          --ignore '**/*.g.dart,**/generated/**'
          lib

      - name: Scan frontend dependencies for CVEs
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: music-player-frontend
          scanners: vuln
          vuln-type: library
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: '1'

      - name: Upload frontend coverage
        uses: codecov/codecov-action@v5
        with:
          files: music-player-frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: true
          use_oidc: true

      - name: Run Flutter integration tests
        working-directory: ./music-player-frontend
        run: |
          flutter test test/core/integration/song_playlist_flow_test.dart
          xvfb-run -a flutter test integration_test/song_provider_flow_test.dart -d linux
          xvfb-run -a flutter test integration_test/album_provider_flow_test.dart -d linux
          xvfb-run -a flutter test integration_test/playlist_provider_flow_test.dart -d linux
          xvfb-run -a flutter test integration_test/artist_provider_flow_test.dart -d linux

  build-and-deploy-cluj:
    needs: test
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - working-directory: ./music-player-frontend
        run: flutter pub get

      - working-directory: ./music-player-frontend
        run: flutter build web -t lib/main_web.dart --base-href / --pwa-strategy=none --release --dart-define=API_BASE_URL=https://api.dariussala.com/music-player --dart-define=WS_BASE_URL=wss://wss.dariussala.com/music-player/signaling --dart-define=DOWNLOAD_BASE_URL=https://music.dariussala.com/downloads

      - id: ssh_cluj
        uses: appleboy/ssh-action@v1.0.0
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST_CLUJ }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            rm -rf /var/www/music-frontend/*

      - id: scp_cluj
        uses: appleboy/scp-action@v0.1.7
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST_CLUJ }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "music-player-frontend/build/web/*"
          target: "/var/www/music-frontend"
          strip_components: 3

      - name: Validate Cluj deployment
        if: always()
        run: |
          if [ "${{ steps.scp_cluj.outcome }}" = "success" ]; then
            echo "Cluj VPS deployment succeeded."
          else
            echo "Cluj VPS deployment failed."
            exit 1
          fi
