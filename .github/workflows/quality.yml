name: Code Quality and Security

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: Backend tests, coverage, and static analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Test and enforce 85% line coverage
        working-directory: music-player-backend
        run: ./mvnw --batch-mode clean verify

      - name: Check style
        working-directory: music-player-backend
        run: ./mvnw --batch-mode org.apache.maven.plugins:maven-checkstyle-plugin:3.6.0:check

      - name: Find code defects
        working-directory: music-player-backend
        run: ./mvnw --batch-mode com.github.spotbugs:spotbugs-maven-plugin:4.9.8.2:check

      - name: Find code issues and duplication
        working-directory: music-player-backend
        run: >-
          ./mvnw --batch-mode
          org.apache.maven.plugins:maven-pmd-plugin:3.28.0:check
          org.apache.maven.plugins:maven-pmd-plugin:3.28.0:cpd-check

      - name: Upload backend coverage
        uses: codecov/codecov-action@v5
        with:
          files: music-player-backend/target/site/jacoco/jacoco.xml
          flags: backend
          fail_ci_if_error: true
          use_oidc: true

  frontend-quality:
    name: Frontend tests, coverage, and static analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies and generate sources
        working-directory: music-player-frontend
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Analyze Dart
        working-directory: music-player-frontend
        run: flutter analyze --fatal-infos

      - name: Test with coverage
        working-directory: music-player-frontend
        run: flutter test --coverage

      - name: Enforce 85% frontend line coverage
        working-directory: music-player-frontend
        run: |
          awk -F: '
            /^LF:/ { total += $2 }
            /^LH:/ { covered += $2 }
            END {
              if (total == 0) {
                print "No coverable Dart lines found in coverage/lcov.info"
                exit 1
              }
              coverage = covered * 100 / total
              printf "Frontend line coverage: %.2f%% (%d/%d)\n", coverage, covered, total
              if (coverage < 85) exit 1
            }
          ' coverage/lcov.info

      - name: Enforce zero duplicated code
        working-directory: music-player-frontend
        run: >-
          npx --yes jscpd@4.0.8
          --threshold 0
          --format dart
          --ignore '**/*.g.dart,**/generated/**'
          lib

      - name: Upload frontend coverage
        uses: codecov/codecov-action@v5
        with:
          files: music-player-frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: true
          use_oidc: true

  dependency-review:
    name: Review dependency changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Reject newly introduced vulnerable dependencies
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: low

  source-vulnerabilities:
    name: Scan dependencies for CVEs
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Scan dependency manifests and lockfiles
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          vuln-type: library
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: '1'

  backend-image-vulnerabilities:
    name: Scan backend image for CVEs
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Package backend
        working-directory: music-player-backend
        run: ./mvnw --batch-mode package -DskipTests

      - name: Build backend image
        run: docker build --tag music-player-backend:cve-scan music-player-backend

      - name: Scan OS and Java packages in the built image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: music-player-backend:cve-scan
          scanners: vuln
          vuln-type: os,library
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: '1'
